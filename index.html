<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">My<span>Page</span></div>
        <button class="cta-btn toggle-modal">Get Started!</button>
    </header>
    <section class="hero">
        <div class="hero-content">
            <h1>Launch Your Product Instantly</h1>
            <p>Build beautiful, responsive landing pages quickly.</p>
            <button class="cta-btn toggle-modal">Start Free Trial Now</button>
        </div>
    </section>
    <button class="theme-toggle" id="themeBtn">🌓</button>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Join Us Now</h2>
            <form id="leadForm">
                <input type="email" placeholder="Your Email" required>
                <button type="submit" class="cta-btn">Submit</button>
            </form>
            <button class="close-modal" id="closeModal">✕</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
